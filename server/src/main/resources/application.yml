server:
  port: 8080

app:
  cors:
    allowed-origins:
      - http://localhost:3000
  live-research:
    enabled: ${APP_LIVE_RESEARCH_ENABLED:false}
    provider: ${APP_LIVE_RESEARCH_PROVIDER:kimi}
    model: ${MOONSHOT_MODEL:kimi-k2.6}
    api-key: ${MOONSHOT_API_KEY:}
    base-url: ${MOONSHOT_BASE_URL:https://api.moonshot.cn/v1}
    formula-uri: ${MOONSHOT_FORMULA_URI:moonshot/web-search:latest}
    connect-timeout-seconds: ${LIVE_RESEARCH_CONNECT_TIMEOUT_SECONDS:10}
    request-timeout-seconds: ${LIVE_RESEARCH_REQUEST_TIMEOUT_SECONDS:24}
    research-timeout-seconds: ${LIVE_RESEARCH_TIMEOUT_SECONDS:42}
    structuring-provider: ${LIVE_STRUCTURING_PROVIDER:}
    structuring-model: ${LIVE_STRUCTURING_MODEL:}
    structuring-api-key: ${LIVE_STRUCTURING_API_KEY:}
    structuring-base-url: ${LIVE_STRUCTURING_BASE_URL:}
  retrieval:
    enabled: ${APP_RETRIEVAL_ENABLED:false}
    provider: ${APP_RETRIEVAL_PROVIDER:}
    endpoint: ${APP_RETRIEVAL_ENDPOINT:}
    api-key: ${APP_RETRIEVAL_API_KEY:}
    request-timeout-seconds: ${APP_RETRIEVAL_REQUEST_TIMEOUT_SECONDS:8}
    max-results: ${APP_RETRIEVAL_MAX_RESULTS:6}
    min-quality-score: ${APP_RETRIEVAL_MIN_QUALITY_SCORE:60}
    cache-ttl-minutes: ${APP_RETRIEVAL_CACHE_TTL_MINUTES:30}
    max-freshness-age-days: ${APP_RETRIEVAL_MAX_FRESHNESS_AGE_DAYS:180}
    tavily-topic: ${APP_RETRIEVAL_TAVILY_TOPIC:general}
    tavily-search-depth: ${APP_RETRIEVAL_TAVILY_SEARCH_DEPTH:basic}
    tavily-time-range: ${APP_RETRIEVAL_TAVILY_TIME_RANGE:month}
    tavily-country: ${APP_RETRIEVAL_TAVILY_COUNTRY:}

spring:
  application:
    name: offer-decision-server
  datasource:
    url: jdbc:h2:file:./data/offer-decision-db;DB_CLOSE_ON_EXIT=FALSE
    driver-class-name: org.h2.Driver
    username: sa
    password:
  jpa:
    database-platform: org.hibernate.dialect.H2Dialect
    hibernate:
      ddl-auto: update
    open-in-view: false
  h2:
    console:
      enabled: true
